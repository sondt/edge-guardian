name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: build · vet · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l $(git ls-files '*.go' | grep -v '_templ.go') || true)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: go vet (native + linux)
        run: |
          go vet ./...
          GOOS=linux GOARCH=amd64 go vet ./...

      - name: go test -race
        run: go test -race -cover ./...

      - name: cross-compile (linux arm64)
        run: GOOS=linux GOARCH=arm64 go build ./...

  goreleaser-check:
    name: packaging builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: build --snapshot --clean --single-target

  nft-integration:
    name: real nftables (enforcer · detection · blocklist)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: end-to-end on real Linux nftables (Docker)
        run: bash dev/docker-test.sh
