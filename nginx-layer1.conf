# ===========================================================================
# Lớp 1 (tùy chọn nhưng khuyến nghị): nginx tự chặn request rác bằng return 444.
# Đặt edge-guardian làm lớp 2 để ban IP toàn cụm + thông báo.
#
# CÁCH DÙNG:
#   1. Đặt block `map` vào trong http {} (file nginx.conf hoặc conf.d/).
#   2. Đặt block trong server {} vào (các) server block cần bảo vệ.
# ===========================================================================

# --- Đặt trong http {} ---
map $request_uri $ns_is_scanner {
    default 0;
    "~*\.(php|cgi|asp|aspx|jsp|env|git|sql|bak)(\?|/|$)"   1;
    "~*/(wp-admin|wp-login|wp-content|wp-includes|xmlrpc)" 1;
    "~*/(phpmyadmin|pma|adminer|mysqladmin|dbadmin)"       1;
    "~*/(\.env|\.git|\.aws|\.ssh|\.docker)"                1;
    "~*/(vendor/phpunit|eval-stdin|cgi-bin)"               1;
}

# Log riêng cho request scanner (định dạng combined, đủ cho line_regex mặc định).
# Trỏ edge-guardian vào file này nếu muốn nó chỉ xử lý request đã được nginx lọc sẵn
# (nhanh hơn, không cần edge-guardian tự match pattern).
# log_format ns_combined '$remote_addr - $remote_user [$time_local] '
#                        '"$request" $status $body_bytes_sent '
#                        '"$http_referer" "$http_user_agent"';


